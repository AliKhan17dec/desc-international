version: "3.9"

services:
  caddy:
    image: caddy:2
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - desci-network

volumes:
  caddy_data:
  caddy_config:

networks:
  desci-network:
    external: false
